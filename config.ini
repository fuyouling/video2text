[app]
log_level = INFO

[transcription]
model_path = large-v3
device = cuda
language = zh
beam_size = 5
best_of = 5
temperature = 0.0
compute_type = float16
num_workers = 1
vad_filter = True
condition_on_previous_text = True
word_timestamps = False

[summarization]
provider = ollama
ollama_url = http://127.0.0.1:11434
model_name = qwen2.5:7b-instruct-q4_K_M
max_length = 10000
temperature = 0.7
timeout = 600
custom_prompt = 
nvidia_api_url = https://integrate.api.nvidia.com/v1/chat/completions
nvidia_model = openai/gpt-oss-120b
nvidia_max_tokens = 100000
nvidia_temperature = 1.0
nvidia_top_p = 1.0
nvidia_frequency_penalty = 0.0
nvidia_presence_penalty = 0.0
nvidia_mode = multi
nvidia_thread_count = 5
nvidia_stream = false

[preprocessing]
ffmpeg_path = ffmpeg
audio_sample_rate = 16000
audio_channels = 1
max_chunk_duration = 300
supported_video_formats = .mp4,.avi,.mov,.mkv,.flv,.wmv,.webm,.ts,.mts,.m4v,.3gp,.mpeg,.mpg,.vob,.ogv,.rm,.rmvb
supported_audio_formats = .mp3,.wav,.flac,.aac,.ogg,.m4a,.wma

[output]
output_dir = output
transcript_format = txt
summary_format = md

[network]
proxy = 
hf_mirror_url = https://huggingface.co/Systran/faster-whisper-large-v3/resolve/main
download_timeout = 300
download_max_retries = 3

[paths]
models_dir = models
logs_dir = logs
video_dir = video

[tools]
watermark_mode = blur
watermark_blur_size = 51
watermark_inpaint_radius = 5
watermark_output_dir = nowm
watermark_max_batch = 200

[text_processing]
max_gap = 2.0
min_length = 50
filler_words = 嗯,啊,呃,嗯嗯,啊啊

