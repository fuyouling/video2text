[app]
log_level = INFO

[transcription]
model_path = large-v3
device = cuda
language = zh
beam_size = 5
best_of = 5
temperature = 0.0
compute_type = float16
num_workers = 1
vad_filter = True

[summarization]
provider = ollama
ollama_url = http://127.0.0.1:11434
model_name = gpt-oss:120b-cloud
max_length = 10000
temperature = 0.7
timeout = 600
custom_prompt = 
nvidia_api_url = https://integrate.api.nvidia.com/v1/chat/completions
nvidia_model = openai/gpt-oss-120b
nvidia_max_tokens = 100000
nvidia_temperature = 1.0
nvidia_top_p = 1.0
nvidia_frequency_penalty = 0.0
nvidia_presence_penalty = 0.0

[preprocessing]
ffmpeg_path = ffmpeg
audio_sample_rate = 16000
audio_channels = 1
max_chunk_duration = 300
supported_video_formats = .mp4,.avi,.mov,.mkv,.flv,.wmv,.webm,.ts,.mts,.m4v,.3gp,.mpeg,.mpg,.vob,.ogv,.rm,.rmvb

[output]
output_dir = output
transcript_format = txt
summary_format = md

[network]
proxy = http://127.0.0.1:7890

[paths]
models_dir = models
logs_dir = logs
video_dir = video

