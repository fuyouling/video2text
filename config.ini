[app]
name = video2text
version = 1.0.0
log_level = INFO

[transcription]
model_path = large-v3
device = cuda
language = zh
beam_size = 5
best_of = 5
temperature = 0.0

[summarization]
ollama_url = http://127.0.0.1:11434
model_name = qwen2.5:7b-instruct-q4_K_M
max_length = 500
temperature = 0.7

[preprocessing]
ffmpeg_path = ffmpeg
audio_sample_rate = 16000
audio_channels = 1
supported_video_formats = .mp4,.avi,.mov,.mkv,.flv,.wmv,.webm

[output]
output_dir = output
transcript_format = txt,srt,vtt
summary_format = txt
json_output = true

[paths]
models_dir = models
logs_dir = logs
video_dir = video
