[app]
log_level = INFO
incremental_mode = False

[transcription]
model_path = faster-whisper-large-v3-turbo-ct2
device = cuda
language = zh
beam_size = 5
best_of = 5
temperature = 0.0,0.2,0.4
compute_type = float16
num_workers = 1
vad_filter = True
condition_on_previous_text = False
word_timestamps = False
initial_prompt = 国内电商教学教程，请精准识别电商专业术语，简体中文输出。
hotwords = 抖店 SKU 一件代发 千川
compression_ratio_threshold = 2.4
log_prob_threshold = -1.0
no_speech_threshold = 0.6
repetition_penalty = 1.0
no_repeat_ngram_size = 0
vad_threshold = 0.5
vad_min_silence_ms = 2000
vad_speech_pad_ms = 400
vad_max_speech_s = 0

[summarization]
provider = nvidia
ollama_url = http://127.0.0.1:11434
model_name = qwen2.5:7b-instruct-q4_K_M
max_length = 10000
temperature = 0.7
timeout = 60
custom_prompt = 
nvidia_api_url = https://integrate.api.nvidia.com/v1/chat/completions
nvidia_model = openai/gpt-oss-120b
nvidia_max_tokens = 100000
nvidia_temperature = 1.0
nvidia_top_p = 1.0
nvidia_frequency_penalty = 0.0
nvidia_presence_penalty = 0.0
nvidia_timeout = 60
nvidia_mode = multi
nvidia_thread_count = 5
nvidia_stream = False
zhipu_model = glm-4.7
zhipu_max_tokens = 65536
zhipu_temperature = 1.0
zhipu_timeout = 60
zhipu_mode = single
zhipu_stream = True
zhipu_thread_count = 5

[preprocessing]
audio_sample_rate = 16000
audio_channels = 1
max_chunk_duration = 300
supported_video_formats = .mp4,.avi,.mov,.mkv,.flv,.wmv,.webm,.ts,.mts,.m4v,.3gp,.mpeg,.mpg,.vob,.ogv,.rm,.rmvb
supported_audio_formats = .mp3,.wav,.flac,.aac,.ogg,.m4a,.wma

[output]
output_dir = output
transcript_format = txt
summary_format = md
mirror_enabled = False
mirror_depth = 1

[network]
proxy = 

[paths]
models_dir = models
logs_dir = logs
video_dir = video

[text_processing]
max_gap = 2.0
min_length = 50
filler_words = 嗯,啊,呃,嗯嗯,啊啊

[voice_to_text]
voice_dir = voice/voice_to_text
summary_dir = voice/summary
realtime_auto_send_interval = 10
noise_suppression = False
noise_gate_threshold = 0.015
spectral_subtraction_factor = 1.5
noise_profile_frames = 10
vad_onset_enhanced = 0.300
vad_offset_enhanced = 0.200

