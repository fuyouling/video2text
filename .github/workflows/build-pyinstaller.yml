name: PyInstaller Standalone Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine version
        id: version
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $ver = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $cfgVer = (Select-String -Path config.ini -Pattern 'version\s*=\s*(.+)').Matches.Groups[1].Value.Trim()
            $shortHash = "${{ github.sha }}".Substring(0, 7)
            $ver = "$cfgVer-$shortHash"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            build
            dist/video2text_portable
          key: pyinstaller-build-${{ runner.os }}-${{ hashFiles('requirements.txt', 'video2text_portable.spec', 'src/**/*.py') }}-v1

      - name: PyInstaller compile
        run: |
          pyinstaller video2text_portable.spec --noconfirm

      - name: Create runtime directories
        run: |
          @("models", "logs", "output", "video") | ForEach-Object {
            New-Item -ItemType Directory -Path "dist\video2text_portable\$_" -Force | Out-Null
          }

      - name: Copy extra assets
        run: |
          if (Test-Path "assets") {
            Copy-Item -Recurse -Force "assets" "dist\video2text_portable\assets"
          }
          if (Test-Path "README.md") {
            Copy-Item -Force "README.md" "dist\video2text_portable\"
          }

      - name: Create ZIP artifact
        id: zip
        run: |
          $zipName = "video2text-v${{ steps.version.outputs.VERSION }}-windows-x64.zip"
          $staging = "dist\staging"
          if (Test-Path $staging) { Remove-Item -Recurse -Force $staging }
          Copy-Item -Recurse -Force "dist\video2text_portable" $staging
          Compress-Archive -Path "$staging\*" -DestinationPath "dist\$zipName" -Force
          Remove-Item -Recurse -Force $staging
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video2text-v${{ steps.version.outputs.VERSION }}-windows-x64
          path: dist/video2text-v${{ steps.version.outputs.VERSION }}-windows-x64.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/video2text-v${{ steps.version.outputs.VERSION }}-windows-x64.zip
          generate_release_notes: true
          name: ${{ steps.version.outputs.VERSION }}
