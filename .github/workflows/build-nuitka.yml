name: Nuitka Standalone Build

on:
  push:
    tags:
      - 'v*'               # 推送 tag 时触发
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 设置 Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. 安装依赖 ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      # ── 4. 提取版本号 ──
      - name: Determine version
        id: version
        run: |
          # 优先用 git tag，否则从 config.ini 读取 + 短提交哈希
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $ver = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $cfgVer = (Select-String -Path config.ini -Pattern 'version\s*=\s*(.+)').Matches.Groups[1].Value.Trim()
            $shortHash = "${{ github.sha }}".Substring(0, 7)
            $ver = "$cfgVer-$shortHash"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      # ── 5. 缓存 Nuitka 编译产物 ──
      - name: Cache Nuitka build
        uses: actions/cache@v4
        with:
          path: dist/main.build
          key: nuitka-build-${{ runner.os }}-${{ hashFiles('requirements.txt', 'src/**/*.py') }}-v2

      # ── 6. 编译 ──
      - name: Nuitka compile
        run: |
          python -m nuitka `
            --standalone `
            --enable-console `
            --windows-icon-from-ico=assets/video2text_logo.ico `
            --enable-plugin=pyside6 `
            --include-data-dir=assets=assets `
            --include-data-files=config.ini=config.ini `
            --include-data-files=logs/readme.md=logs/readme.md `
            --include-data-files=models/readme.md=models/readme.md `
            --include-data-files=output/readme.md=output/readme.md `
            --include-data-files=video/readme.md=video/readme.md `
            --include-module=typing_extensions `
            --include-module=pydantic `
            --include-module=typer `
            --include-module=rich `
            --include-module=requests `
            --include-module=pygments `
            --include-module=markdown `
            --include-module=python_dotenv `
            --include-package-data=faster_whisper `
            --include-package-data=tokenizers `
            --include-package-data=huggingface_hub `
            --include-package-data=ctranslate2 `
            --output-dir=dist `
            --output-filename=video2text.exe `
            --jobs=2 `
            --show-progress `
            .\src\main.py

      # ── 7. 修复 qt.conf ──
      - name: Fix qt.conf
        run: |
          @"
          [Paths]
          Prefix = .
          Plugins = qt-plugins
          "@ | Out-File -FilePath "dist\main.dist\PySide6\qt.conf" -Encoding ascii

      # ── 8. 创建运行时目录 ──
      - name: Create runtime directories
        run: |
          @("models", "logs", "output", "video") | ForEach-Object {
            New-Item -ItemType Directory -Path "dist\main.dist\$_" -Force | Out-Null
          }

      # ── 9. 打包 ZIP（排除 models） ──
      - name: Create ZIP artifact
        run: |
          $zipName = "video2text-v${{ steps.version.outputs.VERSION }}-windows-x64.zip"
          $staging = "dist\staging"
          if (Test-Path $staging) { Remove-Item -Recurse -Force $staging }
          Copy-Item -Recurse -Force "dist\main.dist" $staging
          Compress-Archive -Path "$staging\*" -DestinationPath "dist\$zipName" -Force
          Remove-Item -Recurse -Force $staging
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
        id: zip

      # ── 10. 上传产物 ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video2text-v${{ steps.version.outputs.VERSION }}-windows-x64
          path: dist/video2text-v${{ steps.version.outputs.VERSION }}-windows-x64.zip
          retention-days: 30

      # ── 11. Release 自动发布（仅 tag 触发时） ──
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/video2text-v${{ steps.version.outputs.VERSION }}-windows-x64.zip
          generate_release_notes: true
          name: ${{ steps.version.outputs.VERSION }}